<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聲音數位化 Digitization of Sound | 互動科學館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .hidden { display: none !important; }
        .tab-active { background-color: #3b82f6; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
        .tab-inactive:hover { background-color: #d1d5db; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {-webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #f97316; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #bfdbfe; border-radius: 4px; }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <div id="login-modal" class="fixed inset-0 bg-blue-900 bg-opacity-80 flex items-center justify-center z-50">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl max-w-md w-full text-center">
            <div class="flex justify-center mb-4 text-blue-500">
                <i data-lucide="audio-lines" class="w-20 h-20"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">聲音數位化探險</h1>
            <p class="text-gray-500 mb-6">歡迎來到互動科學館!請輸入你的特務代號登入。</p>
            <div class="space-y-4">
                <select id="login-class" class="w-full px-4 py-3 rounded-xl border-2 border-blue-200 outline-none bg-white">
                    <option value="" disabled selected>請選擇班級</option>
                    <option value="901">901</option>
                    <option value="902">902</option>
                    <option value="903">903</option>
                    <option value="904">904</option>
                    <option value="905">905</option>
                    <option value="906">906</option>
                </select>
                <input type="number" id="login-seat" placeholder="座號(例: 5)" class="w-full px-4 py-3 rounded-xl border-2 border-blue-200 outline-none">
                <input type="text" id="login-name" placeholder="姓名" class="w-full px-4 py-3 rounded-xl border-2 border-blue-200 outline-none">
                <button onclick="app.login()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl text-xl shadow-lg transform transition active:scale-95">開始探險</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex-1 flex flex-col md:flex-row h-full">
        <div class="w-full md:w-64 bg-white shadow-xl z-10 flex flex-col flex-shrink-0 overflow-y-auto">
            <div class="p-6 bg-blue-600 text-white flex items-center gap-3">
                <i data-lucide="waves" class="w-8 h-8"></i>
                <h2 class="text-xl font-bold leading-tight">數位聲音<br>特務訓練</h2>
            </div>
            <div class="p-4 bg-blue-50 text-sm font-semibold text-blue-800 border-b border-blue-100 flex justify-between items-center">
                <span id="display-user-info">請先登入</span>
                <span id="timer" class="text-orange-500 font-mono">00:00</span>
            </div>
            <nav class="flex-1 p-4 space-y-2" id="nav-menu"></nav>
        </div>
        <div class="flex-1 bg-gray-50 overflow-y-auto relative">
            <div class="p-8 max-w-5xl mx-auto" id="content-area"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbywCxiV0Cc2JVAS1_k3RtAB8EVNqfQKDmr-krM-RRPHGKulVt1HW3g1OVtSCJ6Nsg5fnA/exec";
        
        const refreshIcons = () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        const app = {
            user: { class: '', seat: '', name: '' },
            startTime: null,
            timerInterval: null,
            currentUnit: 0,
            p5instances: [],
            quizScore: 0,
            quizResults: { correct: 0, wrongNums: [] },
            units: [
                { id: 'u0', title: '0. 課程首頁', icon: 'home', render: () => renderUnit0() },
                { id: 'u1', title: '1. 聲音是什麼?', icon: 'volume-2', render: () => renderUnit1() },
                { id: 'u2', title: '2. 類比 vs 數位', icon: 'arrow-right-left', render: () => renderUnit2() },
                { id: 'u3', title: '3. 取樣 (Sampling)', icon: 'activity', render: () => renderUnit3() },
                { id: 'u4', title: '4. 量化(Quantization)', icon: 'bar-chart-3', render: () => renderUnit4() },
                { id: 'u6', title: '6. 聲音解碼任務', icon: 'file-code-2', render: () => renderUnit6() },
                { id: 'u8', title: '8. 終極測驗挑戰', icon: 'gamepad-2', render: () => renderUnit8() }
            ],
            quiz: [
                {q:"聲音本質上是一種波動,由介質(如空氣)的振動產生。", type: "tf", a: "fg==" },
                {q:"真實世界的聲音是一種連續的「數位訊號」。", type: "tf", a: "bA==" },
                {q:"將聲音數位化的過程,第一步通常是「取樣」。", type: "tf", a: "fg==" },
                {q:"CD音質的標準取樣率是44.1 kHz。", type: "tf", a: "fg==" }
            ],
            showAlert: (title, message) => {
                alert(`${title}\n${message}`);
            },
            login: () => {
                const c = document.getElementById('login-class').value;
                const s = document.getElementById('login-seat').value;
                const n = document.getElementById('login-name').value;
                if(!c || !s || !n) {
                    app.showAlert("錯誤", "請完整選擇班級、並輸入座號與姓名喔!");
                    return;
                }
                app.user = { class: c, seat: s, name: n };
                document.getElementById('display-user-info').innerText = `${c}-${s} ${n}`;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                app.startTime = Date.now();
                app.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - app.startTime) / 1000);
                    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const secs = String(elapsed % 60).padStart(2, '0');
                    document.getElementById('timer').innerText = `${mins}:${secs}`;
                }, 1000);
                app.initNav();
                app.loadUnit(0);
                refreshIcons();
            },
            initNav: () => {
                const nav = document.getElementById('nav-menu');
                nav.innerHTML = "";
                app.units.forEach((unit, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left px-4 py-3 rounded-xl mb-2 flex items-center gap-3 transition-colors tab-inactive`;
                    btn.id = `nav-btn-${idx}`;
                    btn.onclick = () => app.loadUnit(idx);
                    btn.innerHTML = `<i data-lucide="${unit.icon}" class="w-5 h-5"></i> <span class="font-bold">${unit.title}</span>`;
                    nav.appendChild(btn);
                });
            },
            loadUnit: (idx) => {
                app.units.forEach((_, i) => {
                    const btn = document.getElementById(`nav-btn-${i}`);
                    if(btn) btn.className = 'w-full text-left px-4 py-3 rounded-xl mb-2 flex items-center gap-3 transition-colors tab-inactive';
                });
                const activeBtn = document.getElementById(`nav-btn-${idx}`);
                if(activeBtn) activeBtn.className = 'w-full text-left px-4 py-3 rounded-xl mb-2 flex items-center gap-3 transition-colors tab-active';
                
                app.p5instances.forEach(p => p.remove());
                app.p5instances = [];
                app.currentUnit = idx;
                const content = document.getElementById('content-area');
                content.innerHTML = `<h2 class="text-3xl font-extrabold text-blue-800 mb-6 flex items-center gap-3"><i data-lucide="${app.units[idx].icon}" class="w-8 h-8 text-orange-500"></i>${app.units[idx].title}</h2>`;
                app.units[idx].render();
                refreshIcons();
                document.getElementById('content-area').parentElement.scrollTo(0, 0);
            },
            submitData: async () => {
                const payload = { ...app.user, score: app.quizScore, time: document.getElementById('timer').innerText };
                app.showAlert("完成", "成績已嘗試上傳！");
            }
        };

        function renderUnit0() {
            const container = document.getElementById('content-area');
            container.innerHTML += `
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-blue-500">
                    <h3 class="text-2xl font-bold mb-4">課程教學簡報</h3>
                    <div class="aspect-video bg-gray-100 rounded-xl overflow-hidden">
                        <iframe src="https://docs.google.com/presentation/d/1R5bxB8FdnzlKWri956fBcqZMN4pUnwkPGZ-gaYB0DGo/embed" width="100%" height="100%"></iframe>
                    </div>
                </div>`;
        }

        function renderUnit1() {
            const container = document.getElementById('content-area');
            container.innerHTML += `<div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-l-8 border-orange-400">
                <p class="text-xl">聲音其實是物體振動產生的<strong class="text-orange-600">壓力波</strong>。</p>
                <div id="u1-canvas" class="mt-4 h-64 bg-blue-900 rounded-xl"></div>
            </div>`;
            const sketch = (p) => {
                p.setup = () => { p.createCanvas(p.windowWidth > 800 ? 800 : p.windowWidth - 100, 250).parent('u1-canvas'); };
                p.draw = () => {
                    p.background('#1e3a8a');
                    p.stroke(255);
                    p.noFill();
                    p.beginShape();
                    for(let x=0; x<p.width; x++) {
                        let y = p.height/2 + p.sin(x*0.05 + p.millis()/200)*30;
                        p.vertex(x, y);
                    }
                    p.endShape();
                };
            };
            app.p5instances.push(new p5(sketch));
        }

        function renderUnit2() {
            const container = document.getElementById('content-area');
            container.innerHTML += `
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-orange-50 p-6 rounded-2xl border border-orange-200">
                        <h3 class="text-2xl font-bold text-orange-600">類比訊號</h3>
                        <p>連續不斷的波形。</p>
                    </div>
                    <div class="bg-blue-50 p-6 rounded-2xl border border-blue-200">
                        <h3 class="text-2xl font-bold text-blue-600">數位訊號</h3>
                        <p>離散的 0 與 1。</p>
                    </div>
                </div>`;
        }

        function renderUnit3() {
            const container = document.getElementById('content-area');
            container.innerHTML += `<div class="bg-white p-6 rounded-2xl shadow-md">
                <label class="block font-bold">調整取樣率 (Sample Rate)</label>
                <input type="range" id="sr-slider" min="2000" max="44100" step="1000" value="8000" class="w-full">
                <div id="u3-canvas" class="mt-4 h-64 bg-gray-900 rounded-xl"></div>
            </div>`;
        }

        function renderUnit4() {
            const container = document.getElementById('content-area');
            container.innerHTML += `<div class="bg-white p-6 rounded-2xl shadow-md">
                <label class="block font-bold">調整位元深度 (Bit Depth)</label>
                <input type="range" id="bit-slider" min="2" max="16" step="2" value="8" class="w-full">
                <div id="u4-canvas" class="mt-4 h-64 bg-gray-900 rounded-xl"></div>
            </div>`;
        }

        function renderUnit6() {
            const container = document.getElementById('content-area');
            container.innerHTML += `
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h3 class="text-2xl font-bold text-blue-800 mb-4">神祕的十六進位任務</h3>
                    <p class="mb-4">請複製下方內容至 HexEd.it 解碼，輸入解碼後的祝福：</p>
                    <textarea readonly class="w-full h-24 bg-gray-900 text-green-400 p-3 rounded-lg mb-4">FFE348C4000000000058696E670000000F...</textarea>
                    <div class="flex gap-2">
                        <input type="text" id="hex-answer" placeholder="輸入解碼結果" class="flex-1 border-2 border-blue-200 p-2 rounded-lg outline-none">
                        <button onclick="checkHexAnswer()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">核對</button>
                    </div>
                    <div id="hex-result" class="mt-4 font-bold text-xl text-center"></div>
                </div>`;
        }

        // *** 修正後的核對函數 ***
        function checkHexAnswer() {
            const input = document.getElementById("hex-answer").value.trim();
            // "5pyD6ICD5Yqg5rK5" 是 "會考加油" 的 Base64 編碼
            const correctAnswer = atob("5pyD6ICD5Yqg5rK5"); 
            const resultDiv = document.getElementById("hex-result");

            if (input === correctAnswer) {
                resultDiv.innerHTML = `<span class="text-green-600">✅ 正確！老師祝你：${correctAnswer}</span>`;
            } else {
                resultDiv.innerHTML = `<span class="text-red-600">❌ 答案不正確，再試試看喔！</span>`;
            }
        }

        function renderUnit8() {
            const container = document.getElementById('content-area');
            let html = `<div class="space-y-6">`;
            app.quiz.forEach((q, idx) => {
                html += `<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p class="font-bold mb-2">${idx + 1}. ${q.q}</p>
                    <div class="flex gap-4">
                        <label><input type="radio" name="q${idx}" value="fg=="> 是</label>
                        <label><input type="radio" name="q${idx}" value="bA=="> 否</label>
                    </div>
                </div>`;
            });
            html += `<button onclick="app.calculateScore()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">提交測驗</button>
                <div id="quiz-result" class="hidden p-6 bg-green-50 rounded-xl border-2 border-green-500 text-center">
                    <h2 class="text-4xl font-black text-green-600" id="score-display"></h2>
                    <button onclick="app.submitData()" class="mt-4 bg-green-600 text-white px-8 py-2 rounded-lg">上傳成績</button>
                </div></div>`;
            container.innerHTML += html;
            
            app.calculateScore = () => {
                let correct = 0;
                app.quiz.forEach((q, idx) => {
                    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                    if (selected && selected.value === q.a) correct++;
                });
                app.quizScore = Math.round((correct / app.quiz.length) * 100);
                document.getElementById('score-display').innerText = `${app.quizScore} 分`;
                document.getElementById('quiz-result').classList.remove('hidden');
            };
        }

        window.onload = refreshIcons;
    </script>
</body>
</html>
